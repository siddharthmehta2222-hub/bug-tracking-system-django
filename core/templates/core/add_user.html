{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-5" style="max-width:800px;">

    <h3 class="mb-3 text-center">Add New User</h3>
    <hr>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- ROLE -->
        <select name="role" class="form-control mb-3" required>
            <option value="">Select Role</option>
            <option value="admin">Admin</option>
            <option value="manager">Manager</option>
            <option value="developer">Developer</option>
            <option value="tester">Tester</option>
        </select>

        <!-- USERNAME + PASSWORD -->
        <div class="row">
            <div class="col-md-6">
                <input type="text" name="username" placeholder="Username" class="form-control mb-3" required>
            </div>
            <div class="col-md-6">
                <input type="password" name="password" placeholder="Password" class="form-control mb-3" required>
            </div>
        </div>

        <!-- FIRST + LAST NAME -->
        <div class="row">
            <div class="col-md-6">
                <input type="text" name="first_name" placeholder="First Name" class="form-control mb-3">
            </div>
            <div class="col-md-6">
                <input type="text" name="last_name" placeholder="Last Name" class="form-control mb-3">
            </div>
        </div>

        <!-- PHONE + EMAIL -->
        <div class="row">
            <div class="col-md-6">
                <input type="text" name="phone" placeholder="Phone Number" class="form-control mb-3">
            </div>
            <div class="col-md-6">
                <input type="email" name="email" placeholder="Email" class="form-control mb-3" required>
            </div>
        </div>

        <!-- GENDER + DOB -->
        <div class="row">
            <div class="col-md-6">
                <select name="gender" class="form-control mb-3">
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="col-md-6">
                <input type="date" name="dob" class="form-control mb-3">
            </div>
        </div>

        <!-- IMAGE + ADDRESS -->
        <div class="row">
            <div class="col-md-6">
                <input type="file" name="image" class="form-control mb-3">
            </div>
            <div class="col-md-6">
                <textarea name="address" placeholder="Address" class="form-control mb-3"></textarea>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Create User
        </button>

    </form>

</div>

{% endblock %}
