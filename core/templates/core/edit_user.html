{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow border-0">
        <div class="card-body">

            <!-- HEADER -->
            <h3 class="text-center text-primary mb-4">
                Update Profile of {{ user.first_name }}
            </h3>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row g-3">

                    <!-- ROLE -->
                    <div class="col-md-12">
                        <label class="form-label">Select User Role</label>
                        <select name="role" class="form-control" required>
                            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                            <option value="manager" {% if user.role == 'manager' %}selected{% endif %}>Manager</option>
                            <option value="developer" {% if user.role == 'developer' %}selected{% endif %}>Developer</option>
                            <option value="tester" {% if user.role == 'tester' %}selected{% endif %}>Tester</option>
                        </select>
                    </div>

                    <!-- USERNAME -->
                    <div class="col-md-6">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" value="{{ user.username }}" disabled>
                    </div>

                    <!-- EMAIL -->
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" value="{{ user.email }}" disabled>
                    </div>

                    <!-- FIRST NAME -->
                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
                    </div>

                    <!-- LAST NAME -->
                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
                    </div>

                    <!-- PHONE -->
                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="text" name="phone" class="form-control" value="{{ user.phone }}">
                    </div>

                    <!-- GENDER -->
                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select name="gender" class="form-control">
                            <option value="male" {% if user.gender == 'male' %}selected{% endif %}>Male</option>
                            <option value="female" {% if user.gender == 'female' %}selected{% endif %}>Female</option>
                        </select>
                    </div>

                    <!-- DOB -->
                    <div class="col-md-6">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" name="dob" class="form-control" value="{{ user.dob|date:'Y-m-d' }}">
                    </div>

                    <!-- IMAGE -->
                    <div class="col-md-6">
                        <label class="form-label">Profile Image</label>
                        <input type="file" name="image" class="form-control">
                    </div>

                    <!-- CURRENT IMAGE -->
                    <div class="col-md-6">
                        {% if user.image %}
                            <img src="{{ user.image.url }}" width="80" class="mt-2 rounded">
                        {% endif %}
                    </div>

                    <!-- ADDRESS -->
                    <div class="col-md-12">
                        <label class="form-label">Address</label>
                        <textarea name="address" class="form-control" rows="2">{{ user.address }}</textarea>
                    </div>

                </div>

                <!-- BUTTON -->
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary px-5">
                        Update User
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
