{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Notifications</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: #f5f7fb;
        }

        .card-box {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .title {
            color: #0d6efd;
            font-weight: 600;
        }

        .notification-item {
            padding: 12px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .notification-item:hover {
            background: #f1f5ff;
        }

        .unread {
            background: #e7f1ff;
            font-weight: 500;
        }

        .time {
            font-size: 12px;
            color: gray;
        }

        .mark-read {
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card-box">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="title"><i class="fa fa-bell"></i> Notifications</h4>

            <a href="{% url 'dashboard' %}" class="btn btn-sm btn-primary">
                Back
            </a>
        </div>

        {% if notifications %}
            {% for n in notifications %}
                <div class="notification-item mb-2 {% if not n.is_read %}unread{% endif %}">
                    
                    <div class="d-flex justify-content-between">
                        <div>
                            <i class="fa fa-info-circle text-primary"></i>
                            {{ n.message }}
                        </div>

                        {% if not n.is_read %}
                        <a href="{% url 'mark_read' n.id %}" class="text-success mark-read">
                            Mark Read
                        </a>
                        {% endif %}
                    </div>

                    <div class="time mt-1">
                        {{ n.created_at|date:"d M Y, h:i A" }}
                    </div>

                </div>
            {% endfor %}
        {% else %}
            <div class="text-center text-muted">
                No notifications found
            </div>
        {% endif %}

    </div>

</div>

</body>
</html>
