{% extends 'core/base.html' %}
{% load static %}

{% block content %}

<style>
body{
    background:#f5f7fb;
}

.auth-container{
    max-width:450px;
    margin:60px auto;
    background:white;
    padding:40px;
    border-radius:16px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.auth-title{
    text-align:center;
    margin-bottom:30px;
}

.form-control{
    height:45px;
    border-radius:8px;
}

.btn-custom{
    background:linear-gradient(to right,#06b6d4,#3b82f6);
    color:white;
    border:none;
    height:45px;
    border-radius:8px;
    font-weight:500;
}

.password-box{
    position:relative;
}

.eye-btn{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:18px;
    color:#555;
}
</style><div class="auth-container"><div class="auth-title">
    <h2>Login 🔐</h2>
    <p class="text-muted">Welcome back!</p>
</div>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-danger">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label>Username</label>
        <input type="text" name="email" class="form-control" placeholder="Enter username" required>
    </div>

    <div class="mb-3 password-box">
        <label>Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
        <span class="eye-btn" onclick="togglePassword()">👁️</span>
    </div>

    <div class="text-end mb-3">
        <a href="#" style="font-size:13px;">Forgot Password?</a>
    </div>

    <button type="submit" class="btn btn-custom w-100">Login</button>

</form>

<div class="text-center mt-3">
    <p>Don't have an account? 
        <a href="{% url 'signup' %}">Create Account</a>
    </p>
</div>

</div><script>
function togglePassword(){
    const password = document.getElementById("password");
    password.type = password.type === "password" ? "text" : "password";
}
</script>{% endblock %}
